name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build packages
        run: python build.py

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            chat2goal-dist/chat2goal-all-platforms.zip
            chat2goal-dist/chat2goal-universal.zip
            chat2goal-dist/chat2goal-perplexity.zip
            chat2goal-dist/chat2goal-claude.zip
            chat2goal-dist/chat2goal-chatgpt.zip
            chat2goal-dist/chat2goal-gemini.zip
            chat2goal-dist/chat2goal-cursor.zip
            chat2goal-dist/chat2goal-github-copilot.zip
            chat2goal-dist/chat2goal-microsoft.zip
            chat2goal-dist/chat2goal-codex.zip
            chat2goal-dist/chat2goal-generic.zip
            chat2goal-dist/chat2goal-prompts.zip
          generate_release_notes: false
